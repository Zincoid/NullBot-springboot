<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>梗图模板</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #f5f5f5;
        }
        #wrap {
            position: relative;
            width: 618px;
            height: 916px;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .layer {
            position: absolute;
        }
    </style>
</head>
<body>
    <div id="wrap" style="background-image: url('${background}');">
        <div class="layer" style="position:absolute;left:227px;top:70px;width:86px;height:93px;font-family:Arial;font-size:20px;color:rgb(0, 0, 0);text-align:left;-webkit-text-stroke:1px rgb(0, 0, 0);text-stroke:1px rgb(0, 0, 0);transform:;">${text1}</div>
        <div class="layer" style="position:absolute;left:179px;top:223px;width:85px;height:97px;font-family:Arial;font-size:20px;color:rgb(0, 0, 0);text-align:left;-webkit-text-stroke:1px rgb(0, 0, 0);text-stroke:1px rgb(0, 0, 0);transform:;">${text2}</div>
        <div class="layer" style="position:absolute;left:60px;top:453px;width:293px;height:143px;font-family:Arial;font-size:40px;color:rgb(0, 0, 0);text-align:center;-webkit-text-stroke:1px rgb(0, 0, 0);text-stroke:1px rgb(0, 0, 0);transform:;">${text3}</div>
    </div>
</body>
</html>
